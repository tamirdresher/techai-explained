name: Create Gumroad Products (one-time)

on:
  workflow_dispatch:

jobs:
  create-products:
    runs-on: ubuntu-latest
    steps:
      - name: Create AI-Powered Dev course on Gumroad
        env:
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.gumroad.com/v2/products" \
            -d "access_token=$GUMROAD_TOKEN" \
            -d "name=AI-Powered Development: From Copilot to Full Agent Teams" \
            -d "price=1999" \
            -d "url=ai-powered-dev-course" \
            -d "published=false")
          echo "Response: $RESPONSE"
          PRODUCT_ID=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('product',{}).get('id','FAILED') if d.get('success') else 'ERROR:'+d.get('message','unknown'))")
          echo "Product ID: $PRODUCT_ID"
          if [[ "$PRODUCT_ID" != "FAILED" && "$PRODUCT_ID" != ERROR* ]]; then
            echo "SUCCESS: Product created with ID $PRODUCT_ID"
            # Add EARLYBIRD offer code
            curl -s -X POST "https://api.gumroad.com/v2/products/$PRODUCT_ID/offer_codes" \
              -d "access_token=$GUMROAD_TOKEN" \
              -d "offer_code=EARLYBIRD" \
              -d "amount_off=1000" \
              -d "max_purchase_count=100"
            echo ""
            echo "EARLYBIRD offer created"
            # Also copy token to content-empire (output it masked for use as secret)
            echo "::notice::Gumroad product created! ID: $PRODUCT_ID"
            echo "GUMROAD_PRODUCT_ID=$PRODUCT_ID" >> $GITHUB_ENV
          fi

      - name: Update content-empire secret GUMROAD_AI_COURSE_ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          if [ -n "$GUMROAD_PRODUCT_ID" ]; then
            echo "Product ID captured: $GUMROAD_PRODUCT_ID"
            # Can't set org secrets here, but the product ID is logged above
            echo "## ✅ Gumroad Product Created" >> $GITHUB_STEP_SUMMARY
            echo "- **Product ID:** $GUMROAD_PRODUCT_ID" >> $GITHUB_STEP_SUMMARY
            echo "- **URL:** https://gumroad.com/l/ai-powered-dev-course" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** Draft (review at https://app.gumroad.com/products)" >> $GITHUB_STEP_SUMMARY
          fi
